<head>
  <script src="https://res.cdn.office.net/teams-js/2.53.0/js/MicrosoftTeams.min.js"
          integrity="sha384-UFKwOGC8ix6vOFFC4vH8hSpjwkQXZmSjCx8aaxwhbtm+6joQdNvD7b4pPk82cYAD"
          crossorigin="anonymous"></script>
</head>

<body>
  <div class="font-semibold font-title">Configure your app here</div>
  <form>
    <p>
      <label for="tabChoice">Select the tab you would like to see: </label>
      <div>
        <input type="radio" name="tabType" value="tasks" onclick="onClick()"> Teams Dialogs<br>
        <input type="radio" name="tabType" value="helloworld" onclick="onClick()"> Hello World
      </div>
    </p>
  </form>
  <script>
    microsoftTeams.app.initialize().then(() => {
      const tabType = document.getElementsByName("tabType");

      microsoftTeams.pages.config.registerOnSaveHandler((saveEvent) => {
        const config = {
          entityID: "Task",
          contentUrl: tabType[0].checked ? `${window.location.origin}/taskmodule.html` : `${window.location.origin}/hello.html`,
          suggestedTabName: tabType[0].checked ? "TaskModule" : "Hello World",
          websiteUrl: tabType[0].checked ? `${window.location.origin}/taskmodule.html` : `${window.location.origin}/hello.html`,
        };
        microsoftTeams.pages.config.setConfig(config);
        saveEvent.notifySuccess();
      });
    });

    // onclick event handler
    function onClick() {
      microsoftTeams.pages.config.setValidityState(true);
    }
  </script>
</body>
